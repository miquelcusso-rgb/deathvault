name: Daily Data Update

on:
  # Run every day at 07:00 UTC
  schedule:
    - cron: "0 7 * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    name: Fetch news, update death rates, enrich events, fetch trends

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch outbreak news (WHO, ECDC, CDC, PAHO, ProMED, ReliefWeb)
        run: node scripts/fetch-outbreak-news.mjs

      - name: Update death rates (WHO GHO API)
        run: node scripts/update-death-rates.mjs

      - name: Enrich events with Wikipedia data
        run: node scripts/enrich-events.mjs

      - name: Fetch trending disease signals
        run: node scripts/fetch-trends.mjs

      - name: Check for changes in data directory
        id: check
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data files
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "outbreak-bot[bot]"
          git config user.email "outbreak-bot@users.noreply.github.com"
          git add data/news-feed.json data/death-rates.json data/event-updates.json data/trend-signals.json
          git commit -m "chore: daily data update [skip ci]

          Auto-updated: news feed, death rates, event enrichment, trend signals.
          Updated: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: No changes detected
        if: steps.check.outputs.changed != 'true'
        run: echo "No data changes detected — all files unchanged."
